<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="page">
  <header class="header">
    <img src="./images/header__logo.svg" class="header__logo" alt="Место">
  </header>

  <main>
    <section class="profile">
      <div class="profile__user">
        <img src="./images/profile-avatar.svg" class="profile__avatar" alt="аватар">
        <div class="profile__info">
          <div class="profile__name">
            <h1 class="profile__user-name">Жак-Ив Кусто</h1>
            <button type="button" class="profile__edit-button" aria-label="Изменить профиль"></button>
          </div>
          <p class="profile__user-info">Исследователь океана</p>
        </div>
      </div>
      <button type="button" class="profile__add-button" aria-label="Добавить место"></button>
    </section>
    <section class="elements-section">
      <ul class="elements">
      </ul>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
  </footer>

  <div class="popup popup_profile">
    <div class="popup__container">
      <button type="button" class="popup__close"></button>
      <form class="popup__form popup__profile-form" name="form" novalidate>
        <fieldset class="popup__input-container">
          <h2 class="popup__heading">Редактировать профиль</h2>
          <input type="text" class="popup__item popup__item_name_input" name="input-name" placeholder="Имя" minlength="2" maxlength="40" id="popup__name-input" required>
          <span class="popup__span popup__name-input-error"></span>
          <input type="text" class="popup__item popup__item_job_input" name="input-job" placeholder="О себе" minlength="2" maxlength="200" id="popup__job-input" required>
          <span class="popup__span popup__job-input-error"></span>
        </fieldset>
        <button type="submit" class="popup__input-error popup__button">Сохранить</button>
      </form>
    </div>
  </div>

  <div class="popup popup_addplace">
    <div class="popup__container">
      <button type="button" class="popup__close"></button>
      <form class="popup__form popup__place-form" name="form" novalidate>
        <fieldset class="popup__input-container">
          <h2 class="popup__heading">Новое место</h2>
          <input type="text" class="popup__item popup__item_title_input" name="input-place-name" minlength="2" maxlength="30" placeholder="Название" id="popup__placeinput"
            required>
            <span class="popup__span popup__placeinput-error"></span>
          <input type="url" class="popup__item popup__item_place_input" id="popup__linkinput" name="input-place"
            placeholder="Ссылка на картинку" required>
            <span class="popup__span popup__linkinput-error"></span>
        </fieldset>
        <button type="submit" class="popup__button popup__addplace-button popup__button_disabled" disabled>Создать</button>
      </form>
    </div>
  </div>

  <div class="popup popup_large-img">
    <div class="popup__container-image">
      <button type="button" class="popup__close"></button>
      <img src="#" class="popup__image" alt="увеличенное изображение места">
    </div>
  </div>

  <template id="additional_card">
    <li class="element">
      <img src="#" class="element__image" alt="фотография места">
      <div class="element__text">
        <h2 class="element__title"></h2>
        <button class="element__like" type="button" aria-label="Нравится"></button>
        <button type="button" class="element__delete" aria-label="Закрыть"></button>
      </div>
    </li>
  </template>

  <script src="./scripts/index.js"></script>
  <script src="./scripts/validate.js"></script>

</body>

</html>
