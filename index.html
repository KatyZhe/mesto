  <div class="popup">
    <form class="popup__container" name="form">
      <button type="submit" class="popup__close"><svg class="popup__close-img" width="33" height="33"
          viewBox="0 0 33 33" fill="none" xmlns="http://www.w3.org/2000/svg">

            d="M32.7905 29.5903L19.9905 16.7903L32.7905 3.99028L29.5905 0.790283L16.7905 13.5903L3.99053 0.790283L0.790527 3.99028L13.5905 16.7903L0.790527 29.5903L3.99053 32.7903L16.7905 19.9903L29.5905 32.7903L32.7905 29.5903Z"

      <fieldset class="popup__input-container">
        <h2 class="popup__heading">Редактировать профиль</h2>
        <input type="text" class="popup__user-name" placeholder="Жак-Ив Кусто">
        <div class="popup__line"></div>
        <input type="text" class="popup__user-info" placeholder="Исследователь океана">
        <div class="popup__line"></div>
      </fieldset>
      <button type="submit" class="popup__submit">Сохранить</button>
    </form>
