<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="page">
  <header class="header">
    <img src="./images/header__logo.svg" class="header__logo" alt="Место">
    <div class="header__line"></div>
  </header>

  <section class="profile">
    <div class="profile__user">
      <img src="./images/profile-avatar.svg" class="profile__avatar" alt="аватар">
      <div class="profile__info">
        <div class="profile__name">
          <h1 class="profile__user-name">Жак-Ив Кусто</h1>
          <button class="profile__edit-button">
            <img src="./images/edit-button.svg" alt="кнопка изменить" class="profile__edit-img">
          </button>
        </div>
        <p class="profile__user-info">Исследователь океана</p>
      </div>
    </div>
    <button class="profile__add-button">
      <img src="./images/add-img.svg" alt="кнопка добавить" class="profile__add-img">
    </button>
  </section>
  <ul class="elements">
    <li class="element">
      <img src="./images/kirill-pershin-karachaevsk.png" class="element__image" alt="Карачаевск">
      <div class="element__text">
        <h2 class="element__title">Карачаевск</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
    <li class="element">
      <img src="./images/kirill-pershin-elbrus.png" class="element__image" alt="Эльбрус">
      <div class="element__text">
        <h2 class="element__title">Гора Эльбрус</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
    <li class="element">
      <img src="./images/kirill-pershin-dombay.png" class="element__image" alt="Домбай">
      <div class="element__text">
        <h2 class="element__title">Домбай</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
    <li class="element">
      <img src="./images/kirill-pershin-elbrus.png" class="element__image" alt="Гора Эльбрус">
      <div class="element__text">
        <h2 class="element__title">Гора Эльбрус</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
    <li class="element">
      <img src="./images/kirill-pershin-dombay.png" class="element__image" alt="Домбай">
      <div class="element__text">
        <h2 class="element__title">Домбай</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
    <li class="element">
      <img src="./images/kirill-pershin-karachaevsk.png" class="element__image" alt="Карачаево-Черкесия">
      <div class="element__text">
        <h2 class="element__title">Карачаево-Черкесия</h2>
        <img src="./images/like-img.svg" alt="нравится" class="element__like-img">
      </div>
    </li>
  </ul>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
  </footer>

  <div class="popup">
    <form class="popup__container" name="form">
      <button type="submit" class="popup__close">
        <img src="./images/popup__close-img.svg" alt="кнопка закрыть форму" class="popup__close-img">
      </button>
      <fieldset class="popup__input-container">
        <h2 class="popup__heading">Редактировать профиль</h2>
        <input type="text" class="popup__user-name" placeholder="Жак-Ив Кусто">
        <div class="popup__line"></div>
        <input type="text" class="popup__user-info" placeholder="Исследователь океана">
        <div class="popup__line"></div>
      </fieldset>
      <button type="submit" class="popup__submit">Сохранить</button>
    </form>
  </div>

  <script src="./scripts/index.js"></script>
</body>

</html>
